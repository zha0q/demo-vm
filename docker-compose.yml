version: '3.8'

services:
  mahjong-game:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vita-mahjong-game
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - TZ=Asia/Shanghai
